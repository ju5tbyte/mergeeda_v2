# Configuration for AMBA document OCR parsing

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Input PDF path
input_pdf: "data/datasets/amba_document/raw/IHI0022L_amba_axi_protocol_spec.pdf"

# Output directory for parsed results
output_dir: "data/datasets/amba_document/processed/IHI0022L_amba_axi_protocol_spec"

# OCR model configuration
model:
  name: "deepseek-ai/DeepSeek-OCR"
  dpi: 300

# Chunking configuration
chunking:
  # Level to chunk at (e.g., 3 for sections like "1.2.3")
  level: 3
  # Custom regex patterns for each level (null for default)
  level_patterns: null
