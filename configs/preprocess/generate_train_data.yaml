# Configuration for SFT training data generation from AMBA train QA files

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Root directory containing per-dataset processed data (chunks, materials)
processed_dir: "data/datasets/amba_document/processed"

# Root directory for saving generated SFT JSON files
output_dir: "data/datasets/amba_document/sft_data"

# One or more train QA JSON files to process (list)
train_files:
  - "data/datasets/amba_document/eval_qa/IHI0022L_amba_axi_protocol_spec/amba_axi_protocol_spec_concept_train.json"

# Regenerate even when the output file already exists
overwrite: false

# OpenAI model to use for answer generation
model:
  name: "gpt-5.1"
  # API key is read from OPENAI_API_KEY env variable if not set here
  api_key: null
