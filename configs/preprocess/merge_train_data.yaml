# Configuration for merging per-dataset SFT JSON files into a single annotation file

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Root directory containing per-dataset SFT JSON files
sft_data_dir: "data/datasets/amba_document/sft_data"

# Output path for the merged annotation file
output_path: "data/datasets/amba_document/sft_data/merged_train.json"
