# Configuration for base model evaluation

defaults:
  - /model: qwen_vl_model

# Hydra output directory configuration
hydra:
  run:
    dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Input: directory containing evaluation QA JSON files
qa_dir: "data/datasets/amba_document/eval_qa/ARM_IHI_0088H_amba_dti_protocol_spec"

# Input: directory containing extracted material files (images, tables)
materials_dir: "data/datasets/amba_document/processed/ARM_IHI_0088H_amba_dti_protocol_spec/materials"

# Input: directory containing source chunk text files (for LLM judge context)
chunks_dir: "data/datasets/amba_document/processed/ARM_IHI_0088H_amba_dti_protocol_spec/chunks"

# Output directory for preds.json and scores.json
output_dir: "data/evaluation/base_model"

# LLM judge model configuration (OpenAI)
judge:
  name: "gpt-5.1"
  # API key is read from OPENAI_API_KEY env variable if not set here
  api_key: null
